<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Analysis Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo" id="logo-btn" title="Refaceți Dashboard-ul" style="cursor: pointer;">
                <h1>Babi Calculator-<span>inatorul</span></h1>
            </div>
            <div class="search-container">
                <input type="text" id="ticker-input" placeholder="Introduceți Ticker (ex: AAPL)..." autocomplete="off">
                <button id="analyze-btn" class="btn btn-primary">Analizează</button>
                <div id="autocomplete-list" class="autocomplete-dropdown"></div>
            </div>
            <div class="header-actions">
                <button id="watchlist-toggle-btn" class="btn btn-outline">
                    <span class="star-icon">★</span> Watchlist
                </button>
            </div>
        </header>

        <main class="main-content" id="dashboard-content">
            <!-- Conținutul va fi populat de app.js -->
        </main>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
